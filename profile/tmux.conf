set -g status on
set -g status-interval 2
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify left

# C-b is not acceptable, Vim uses it
# C-s is ASCII 19, flow-control XOFF character
set -g prefix C-s
unbind C-b
bind C-s last-window

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster key repetition
set -sg escape-time 0
set -g repeat-time 300

# Constrain window size to the current window's clients
setw -g aggressive-resize on

# Vi keys in copy and command modes
setw -g mode-keys vi
set -g status-keys vi

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Splits open in the current pane's directory
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

# Resize panes
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r + resize-pane -U 5
bind -r - resize-pane -D 5
bind = select-layout even-vertical
bind | select-layout even-horizontal

# Send prefix to nested tmux
bind a send-prefix

# Pane traversal with prefix
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane traversal without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Window naming and terminal
setw -g automatic-rename on
set -g default-terminal "screen-256color"
set-environment -g IGNOREEOF 2

# Status bar
set -g status-right '%a %d %b #{pane_tty} #[fg=colour0,bg=colour10] #H '
set -g status-style 'fg=colour253,bg=colour234'
setw -g window-status-separator ' '
setw -g window-status-current-format '#[fg=colour237,bg=colour214,bold] #I:#[nobold]#W #[fg=black,bg=colour237]'
setw -g window-status-format '#[fg=colour250,bg=colour235,bold] #I:#[fg=colour246,nobold]#W #[fg=black,bg=colour237]'
